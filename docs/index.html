<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="ui.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Smart Forcaster</title>
  </head>
  <body>
    <div class="whole-container">
      <div class="navbar">
        <div class="logo-container"><h3 class="logo">Smart Forcaster</h3></div>
        <div class="navbar-right">
          <img src="./assets/user1.png" alt="usericon" />
        </div>
      </div>
      <div></div>
      <div class="main-container">
        <section id="loginPage" class="login-div">
          <h2>Login Form</h2>
          <hr />
          <br />
          <form id="loginForm">
            <label for="nameInput"
              ><h3 class="username-label">What is your name?</h3></label
            >
            <br />
            <input type="text" name="name" id="nameInput" required /><br />
            <button type="submit">Login</button>
          </form>
          <span class="login-warn">Please enter your name correctly!</span>
        </section>
      </div>
      <footer class="footer">
        <span>Smart Forcaster | Made for Farmers</span>
      </footer>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="ui.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Smart Forcaster Dashboard</title>
  </head>
  <body>
    <div class="whole-container">
    <nav>
      <div class="navbar">
        <div class="logo-container"><h3 class="logo">Smart Forcaster</h3></div>
        <div class="navbar-right">
          <img src="./assets/user1.png" alt="usericon" />
        </div>
      </div>
    </nav>

    <div class="main-container" id="dashboardPage">
      <h2 id="dashboardTitle"></h2>

      <h3>Add a Crop</h3>
      <form id="addCropForm">
        <label for="cropType">Crop Type: </label>
        <select id="cropType" name="cropType" required>
          <option value="">Select a crop</option>
          <option value="Wheat">Wheat</option>
          <option value="Rice">Rice</option>
          <option value="Corn">Corn</option>
          <option value="Barley">Barley</option>
          <option value="Soybean">Soybean</option>
          <option value="Cotton">Cotton</option>
        </select>
        <br />
        <br />

        <label for="plantingDate">Planting Date: </label>
        <input id="plantingDate" type="date" name="plantingDate" required />
        <br />
        <br />

        <label for="fieldLocation">Field Location: </label>
        <input id="fieldLocation" type="text" name="fieldLocation" required />
        <button id="checkWeatherButton" type="button">Weather</button>
        <p id="weatherResult"></p>
        <br />

        <label for="quantity">Quantity: </label>
        <input id="quantity" type="number" name="quantity" min="1" required />
        <br />
        <br />

        <label for="selection-day">Water every: </label>
        <select id="selection-day" name="wateringFrequencyDays">
          <option value="">No reminder</option>
          <option value="1">Every day</option>
          <option value="2">Every 2 days</option>
          <option value="3">Every 3 days</option>
          <option value="7">Every week</option>
          <option value="14">Every 2 weeks</option>
        </select>
        <br />
        <br />

        <label for="imageInput">Upload Picture: </label>
        <input id="imageInput" type="file" />
        <br />
        <br />

        <button type="submit">Add Crop</button>
        <button type="reset" class="reset-button">Reset</button>
      </form>

      <div id="cropsDisplay">
        <h3>Your Crops</h3>
        <div class="filters-container">
          <input id="filterCropName" type="text" placeholder="Crop name" />
          <input
            id="filterQuantity"
            type="number"
            placeholder="Min quantity"
            min="1"
          />
        </div>
        <div id="cardsContainer" class="cards-container"></div>
      </div>

      <br />
      <br />
      <button id="logoutButton" type="button">Logout</button>
    </div>
    <footer class="footer">
      <span>Smart Forcaster | Made for Farmers</span>
    </footer>
    </div>
  </body>
</html>
